name: Deno CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Format, lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check main.ts

      - name: Unit tests
        run: deno task test:unit

      - name: Integration + e2e tests
        run: |
          deno test --unstable-kv --allow-net --allow-env --allow-write=./local_stos.db \
            tests/integration tests/e2e
        env:
          GITHUB_WEBHOOK_SECRET: ci-test-secret
          TELEGRAM_BOT_TOKEN: ci-test-token
